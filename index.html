<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bird Sound Test</title>
<style>
  body { font-family: sans-serif; padding: 40px; background: #f0f7f0; }
  h2 { color: #2d6a4f; }
  .test { background: white; padding: 24px; border-radius: 16px; max-width: 400px; }

  button {
    background: #2d6a4f; color: white; border: none;
    padding: 14px 28px; border-radius: 12px; font-size: 18px;
    cursor: pointer;
  }
  button:hover { background: #1b4332; }

  .player-popup {
    display: none;
    margin-top: 16px;
    border-radius: 12px;
    overflow: hidden;
  }
  .player-popup.open { display: block; }
  .player-popup iframe {
    width: 320px;
    height: 200px;
    border: none;
    display: block;
  }
</style>
</head>
<body>
<div class="test">
  <h2>🐦 American Robin</h2>
  <button onclick="togglePlayer()" id="btn" aria-expanded="false">
    🎵 Play Bird Song
  </button>
  <div class="player-popup" id="player" role="region" aria-label="Bird song player">
    <iframe 
      src="https://macaulaylibrary.org/asset/206448/embed"
      allowfullscreen
      title="American Robin bird song recording from Cornell Macaulay Library">
    </iframe>
  </div>
</div>

<script>
function togglePlayer() {
  const player = document.getElementById('player');
  const btn = document.getElementById('btn');
  const isOpen = player.classList.toggle('open');
  btn.setAttribute('aria-expanded', isOpen);
  btn.textContent = isOpen ? '✕ Close' : '🎵 Play Bird Song';
}
</script>
</body>
</html>
